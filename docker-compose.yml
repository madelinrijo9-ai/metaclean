services:
  metaclean:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metaclean-web
    ports:
      - "8080:80"
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: metaclean-tunnel
    command: tunnel --url http://metaclean:80
    restart: unless-stopped
    depends_on:
      - metaclean
