name: 'Release Build'

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          # WiX Toolset is pre-installed on GitHub Actions runner

      - name: Install project dependencies
        run: pnpm install

      - name: Build and Package App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'MetaClean v__VERSION__'
          releaseBody: 'Automatically compiled release for macOS and Windows.'
          releaseDraft: true
          prerelease: false
          projectPath: './desktop'
          tauriScript: 'pnpm run desktop:build'
